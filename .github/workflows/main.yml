name: Secure RDP Workflow

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub Actions maksimum 6 saat (360 dk) izin verir.
    steps:
      - name: Update and Install RDP & Desktop
        run: |
          sudo apt-get update
          # Gerekli tüm XFCE, XRDP, D-Bus ve Polkit paketlerini yükle
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xorgxrdp xfce4 xfce4-goodies xfce4-session xfce4-settings xfconf \
            dbus-x11 x11-xserver-utils polkitd
          
          # X11 ve SSL izinleri
          echo "allowed_users=anybody" | sudo tee /etc/X11/Xwrapper.config
          sudo adduser xrdp ssl-cert
          
          # XRDP servislerini başlat
          sudo systemctl enable xrdp xrdp-sesman
          sudo systemctl restart xrdp xrdp-sesman

      - name: Create RDP User and Configure Environment
        run: |
          # Kullanıcıyı oluştur
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:P@ssw0rd123!" | sudo chpasswd
          sudo usermod -aG sudo,video,render,users rdpuser
          
          # HATA ÇÖZÜMÜ: Gizli dizinlerin varlığını garanti et (chown hatasını kökten çözer)
          sudo -u rdpuser mkdir -p /home/rdpuser/.cache /home/rdpuser/.config /home/rdpuser/.local/share
          
          # .xsession dosyası
          echo "startxfce4" | sudo -u rdpuser tee /home/rdpuser/.xsession
          sudo chmod +x /home/rdpuser/.xsession
          
          # .xsessionrc (Ortam değişkenleri - xfconfd failsafe hatası için şart)
          cat <<EOF | sudo -u rdpuser tee /home/rdpuser/.xsessionrc
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          export XDG_CONFIG_DIRS=/etc/xdg:/etc
          export XDG_DATA_DIRS=/usr/share/xfce4:/usr/local/share:/usr/share
          export XDG_CACHE_HOME=/home/rdpuser/.cache
          EOF

      - name: Fix Polkit, XRDP Startup & Permissions
        run: |
          # Polkit kuralı (Renk yöneticisi şifre sorma ekranını engeller, siyah ekranı önler)
          sudo mkdir -p /etc/polkit-1/localauthority/50-local.d/
          cat <<EOF | sudo tee /etc/polkit-1/localauthority/50-local.d/45-allow-colord.pkla
          [Allow Colord all Users]
          Identity=unix-user:*
          Action=org.freedesktop.color-manager.*
          ResultAny=no
          ResultInactive=no
          ResultActive=yes
          EOF

          # startwm.sh (Siyah ekran ve xfconfd hatasının ilacı)
          cat <<EOF | sudo tee /etc/xrdp/startwm.sh
          #!/bin/sh
          if [ -r /etc/default/locale ]; then
            . /etc/default/locale
            export LANG LANGUAGE
          fi
          
          # GitHub runner'ın bozuk dbus değişkenlerini temizle
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          
          # Temiz bir dbus oturumuyla XFCE'yi başlat
          exec dbus-run-session -- startxfce4
          EOF
          sudo chmod +x /etc/xrdp/startwm.sh
          
          # Tüm ev dizini izinlerini en son güvenli şekilde ver (Artık hata vermeyecek)
          sudo chown -R rdpuser:rdpuser /home/rdpuser/
          
          # XRDP'yi yeniden başlat
          sudo systemctl restart xrdp xrdp-sesman

      - name: Install and Connect Tailscale (Official Method)
        run: |
          # Tailscale resmi kurulum scripti
          curl -fsSL https://tailscale.com/install.sh | sh
          
          # Tailscale daemon'ını systemd ile garantili şekilde başlat (CI ortamları için en stabil yöntem)
          sudo systemctl enable --now tailscaled
          
          # Tailscale ağına bağlan
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes
          
          # IP'yi al ve çevre değişkenine yaz
          TS_IP=$(tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV
          echo "Tailscale IP: $TS_IP"

      - name: Keep Alive & Connection Info
        run: |
          echo "=================================================="
          echo " RDP BAĞLANTI BİLGİLERİ (Tailscale Üzerinden)"
          echo "=================================================="
          echo " IP Adresi  : $TS_IP"
          echo " Port       : 3389"
          echo " Kullanıcı  : rdpuser"
          echo " Şifre      : P@ssw0rd123!"
          echo "=================================================="
          echo " NOT: Windows RDP'de Renk Derinliğini 24-bit yapın."
          echo "=================================================="
          
          # 6 saat boyunca açık tut (21600 saniye = 360 dakika)
          sleep 21600
