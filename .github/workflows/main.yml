name: Secure RDP Workflow

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    steps:
      - name: Update and Install RDP & Desktop
        run: |
          sudo apt-get update
          # D-Bus hatasını çözmek için dbus-x11 paketini de ekledik
          sudo apt-get install -y xrdp xfce4 xfce4-goodies dbus-x11
          sudo systemctl enable xrdp
          sudo systemctl start xrdp

      - name: Create RDP User and Configure Session
        run: |
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:P@ssw0rd123!" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          
          # Masaüstü ayarını doğrudan rdpuser kullanıcısının ev dizinine yazıyoruz:
          echo "startxfce4" | sudo tee /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          
          # XRDP'nin varsayılan başlatıcısını XFCE'ye zorluyoruz (Siyah ekranı önler)
          sudo sed -i 's/. \/etc\/X11\/Xsession/startxfce4/g' /etc/xrdp/startwm.sh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          TS_IP=$(tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV

      - name: Keep Alive
        run: |
          echo "===================="
          echo "IP: $TS_IP"
          echo "User: rdpuser"
          echo "Pass: P@ssw0rd123!"
          echo "===================="
          while true; do sleep 300; done
