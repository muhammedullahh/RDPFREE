name: Secure RDP Workflow

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    steps:
      - name: Update and Install RDP & LXDE Desktop
        run: |
          sudo apt-get update
          # XFCE yerine çok daha hafif ve sorunsuz olan LXDE'yi kuruyoruz
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xrdp lxde
          sudo systemctl enable xrdp
          # XRDP kullanıcısını SSL sertifikaları grubuna ekliyoruz (Gizli çökmeleri engeller)
          sudo adduser xrdp ssl-cert

      - name: Create RDP User and Configure Session
        run: |
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:P@ssw0rd123!" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          
          # LXDE masaüstünü başlatma komutunu ayarlıyoruz
          echo "startlxde" | sudo tee /home/rdpuser/.xsession > /dev/null
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          sudo chmod +x /home/rdpuser/.xsession
          
          # startwm.sh dosyasını temiz bir şekilde LXDE için yeniden yazıyoruz
          sudo cp /etc/xrdp/startwm.sh /etc/xrdp/startwm.sh.bak
          sudo bash -c 'cat > /etc/xrdp/startwm.sh <<EOF
          #!/bin/sh
          if [ -r /etc/default/locale ]; then
            . /etc/default/locale
            export LANG LANGUAGE
          fi
          # Sadece ve doğrudan LXDE masaüstünü çalıştırıyoruz
          exec startlxde
          EOF'
          
          sudo chmod +x /etc/xrdp/startwm.sh
          sudo systemctl restart xrdp

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          TS_IP=$(tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV

      - name: Keep Alive
        run: |
          echo "===================="
          echo "IP: $TS_IP"
          echo "User: rdpuser"
          echo "Pass: P@ssw0rd123!"
          echo "===================="
          while true; do sleep 300; done
