name: Secure RDP Workflow

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    steps:
      - name: Update and Install RDP & Desktop
        run: |
          sudo apt-get update
          # Kurulum sırasında çıkan gizli klavye/bölge sorularını atlamak için noninteractive kullanıyoruz
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xrdp xorgxrdp xfce4 xfce4-goodies dbus-x11
          sudo systemctl enable xrdp

      - name: Create RDP User and Configure Session
        run: |
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:P@ssw0rd123!" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          
          # CRASH ÇÖZÜMÜ: Ortam değişkenlerini (XDG) elle atayıp, masaüstünü DBUS ile paketleyip açıyoruz.
          sudo bash -c 'cat > /etc/xrdp/startwm.sh <<EOF
          #!/bin/sh
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          export XDG_CONFIG_DIRS=/etc/xdg:/etc
          export XDG_DATA_DIRS=/usr/share/xfce4:/usr/share:/usr/local/share
          
          # D-Bus servisini çalıştırarak XFCE masaüstünü başlat
          exec dbus-run-session -- xfce4-session
          EOF'
          
          sudo chmod +x /etc/xrdp/startwm.sh
          sudo systemctl restart xrdp

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          TS_IP=$(tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV

      - name: Keep Alive
        run: |
          echo "===================="
          echo "IP: $TS_IP"
          echo "User: rdpuser"
          echo "Pass: P@ssw0rd123!"
          echo "===================="
          while true; do sleep 300; done
