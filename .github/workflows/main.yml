name: Ubuntu-RDP

on:
  workflow_dispatch:

jobs:
  ubuntu-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update System
        run: |
          sudo apt update

      - name: Install Desktop + XRDP
        run: |
          sudo apt install -y xfce4 xfce4-goodies xrdp wget curl

          echo "xfce4-session" > ~/.xsession

          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Create User
        run: |
          sudo useradd -m -s /bin/bash rdp
          echo "rdp:P@ssw0rd123!" | sudo chpasswd
          sudo usermod -aG sudo rdp

      - name: Open RDP Port
        run: |
          sudo ufw allow 3389/tcp || true

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

          IP=$(tailscale ip -4)
          echo "TS_IP=$IP" >> $GITHUB_ENV

      - name: Show Connection Info
        run: |
          echo "===================="
          echo "IP: $TS_IP"
          echo "User: rdp"
          echo "Pass: P@ssw0rd123!"
          echo "===================="

      - name: Keep Alive
        run: |
          while true; do
            sleep 300
          done
