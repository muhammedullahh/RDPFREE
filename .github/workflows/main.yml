name: Secure RDP Workflow

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub Actions maksimum 6 saat (360 dk) izin verir.
    steps:
      - name: Update and Install RDP & Desktop
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xorgxrdp xfce4 xfce4-goodies xfce4-session xfce4-settings xfconf \
            dbus-x11 x11-xserver-utils
            
          # X11 izinlerini yapılandır
          echo "allowed_users=anybody" | sudo tee /etc/X11/Xwrapper.config
          sudo adduser xrdp ssl-cert

      - name: Create RDP User and Configure Session
        run: |
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:P@ssw0rd123!" | sudo chpasswd
          sudo usermod -aG sudo,video,render,users rdpuser
          
          # Kullanıcı oturumunu XFCE olarak ayarla
          echo "startxfce4" | sudo tee /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          sudo chmod +x /home/rdpuser/.xsession
          
          # HATA ÇÖZÜMÜ 1: XDG ortam değişkenlerini düzelt (xfconfd failsafe hatası için)
          cat <<EOF | sudo tee /home/rdpuser/.xsessionrc
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          export XDG_CONFIG_DIRS=/etc/xdg:/etc
          export XDG_DATA_DIRS=/usr/share/xfce4:/usr/local/share:/usr/share
          export XDG_CACHE_HOME=/home/rdpuser/.cache
          EOF
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsessionrc
          
          # HATA ÇÖZÜMÜ 2: Bozuk önbellek ve kilit dosyalarını temizle
          sudo rm -rf /home/rdpuser/.config/xfce4/xfconf/xfce-perchannel-xml/*
          sudo rm -f /home/rdpuser/.cache/sessions/xfce4-session-*
          sudo chown -R rdpuser:rdpuser /home/rdpuser/.config /home/rdpuser/.cache

      - name: Fix Polkit and XRDP Startup Script
        run: |
          # HATA ÇÖZÜMÜ 3: Polkit kuralları (Arka planda şifre sorup kilitlenmeyi önler)
          sudo mkdir -p /etc/polkit-1/localauthority/50-local.d/
          cat <<EOF | sudo tee /etc/polkit-1/localauthority/50-local.d/45-allow-colord.pkla
          [Allow Colord all Users]
          Identity=unix-user:*
          Action=org.freedesktop.color-manager.create-device;org.freedesktop.color-manager.create-profile;org.freedesktop.color-manager.delete-device;org.freedesktop.color-manager.delete-profile;org.freedesktop.color-manager.modify-device;org.freedesktop.color-manager.modify-profile
          ResultAny=no
          ResultInactive=no
          ResultActive=yes
          EOF

          # HATA ÇÖZÜMÜ 4: startwm.sh dosyasını sıfırla (Siyah ekran ve Dbus çözümü)
          cat <<EOF | sudo tee /etc/xrdp/startwm.sh
          #!/bin/sh
          if [ -r /etc/default/locale ]; then
            . /etc/default/locale
            export LANG LANGUAGE
          fi
          
          # GitHub Runner'ın zehirli ortam değişkenlerini temizle
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          
          # Temiz bir DBus oturumu içinde XFCE'yi başlat (xfconfd için şart)
          exec dbus-run-session -- startxfce4
          EOF
          sudo chmod +x /etc/xrdp/startwm.sh

      - name: Start XRDP Services
        run: |
          sudo systemctl enable xrdp xrdp-sesman
          sudo systemctl restart xrdp xrdp-sesman
          sleep 5
          sudo systemctl status xrdp --no-pager

      - name: Install and Connect Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          TS_IP=$(tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV

      - name: Keep Alive & Connection Info
        run: |
          echo "==================== RDP BAĞLANTI BİLGİLERİ ===================="
          echo "IP Adresi  : $TS_IP"
          echo "Port       : 3389"
          echo "Kullanıcı  : rdpuser"
          echo "Şifre      : P@ssw0rd123!"
          echo "================================================================"
          echo "NOT: RDP istemcinizde Renk Derinliğini (Color Depth) 24-bit veya 16-bit yapın."
          
          # GitHub 6 saat sınırına kadar sistemi açık tut
          while true; do sleep 300; done
